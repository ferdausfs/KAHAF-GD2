name: Build Debug APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required for AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Set up Gradle (provisions Gradle 8.4 binary, puts `gradle` on PATH)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      # 4. Create local.properties with GitHub Actions SDK path
      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      # 5. ROOT CAUSE FIX: gradle-wrapper.jar is NOT committed to the repo (gitignored).
      #    ./gradlew fails with "ClassNotFoundException: GradleWrapperMain" without it.
      #    Fix: use the provisioned `gradle` binary (step 3) to regenerate the wrapper jar.
      #    This regenerates gradle-wrapper.jar + sets correct version in .properties + makes gradlew executable.
      - name: Generate Gradle wrapper jar
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      # 6. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2048m"

      # 7. Upload APK as downloadable artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GuardianShield-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 8. Print APK info
      - name: APK info
        run: |
          echo "Build complete!"
          ls -lh app/build/outputs/apk/debug/
