name: Build Debug APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Download Gradle + generate wrapper ────
      # gradlew exists in repo but gradle-wrapper.jar is binary,
      # so we download Gradle and regenerate the wrapper properly.
      - name: Generate Gradle wrapper
        run: |
          GRADLE_VERSION=8.4
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
               -O gradle-bin.zip
          unzip -q gradle-bin.zip
          mkdir -p gradle/wrapper
          ./gradle-${GRADLE_VERSION}/bin/gradle wrapper \
            --gradle-version ${GRADLE_VERSION} \
            --distribution-type bin
          chmod +x gradlew
          echo "✅ gradlew generated:"
          ls -lh gradlew gradle/wrapper/

      # ── 4. Cache Gradle ──────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 5. Build debug APK ───────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Upload APK artifact ───────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BulldogBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
